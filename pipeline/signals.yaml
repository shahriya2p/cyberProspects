# Which companies make it into the served database. The raw dataset has millions
# of one-host domains that no rep would ever prospect; we keep a company only if
# it shows at least one attack-surface signal or has a footprint worth a look.
serving:
  min_hostnames: 6   # below this a domain needs a signal to be kept
